# Production-style: same Vite dev images, stricter restart and different default host ports.
# For real production traffic use `vite build` + static/nginx or a process manager — not raw `vite dev`.
# From repo root: docker compose -f docker/compose.production.yaml up --build -d
# From docker/:    docker compose -f compose.production.yaml up --build -d

name: sol-bot-production

x-common-dns: &common_dns
  dns:
    - 8.8.8.8
    - 1.1.1.1

services:
  chart-core:
    <<: *common_dns
    build:
      context: ..
      dockerfile: docker/chart-dev.Dockerfile
    ports:
      - "${CHART_HOST_PORT:-8080}:5173"
    environment:
      NO_PROXY: quote-api.jup.ag,.jup.ag,127.0.0.1,localhost,api.mainnet-beta.solana.com,api.geckoterminal.com
      no_proxy: quote-api.jup.ag,.jup.ag,127.0.0.1,localhost,api.mainnet-beta.solana.com,api.geckoterminal.com
    restart: always
